            color: #1b1c1b;
            font-family: "Source Serif 4", serif;

<body class="min-h-screen flex flex-col antialiased bg-background">
<!-- Top Navigation Bar -->
<header class="sticky top-0 z-40 bg-surface/90 backdrop-blur-md border-b border-outline-variant/10">
<div class="flex flex-row-reverse justify-between items-center w-full px-4 py-4 max-w-7xl mx-auto">
<h1 class="text-headline-md font-headline-md font-bold text-primary">מניין</h1>
<div class="flex items-center gap-4">
<button class="p-2 text-on-surface-variant hover:bg-surface-container-high/50 rounded-full transition-colors">
<span class="material-symbols-outlined">dark_mode</span>
</button>
</div>
</div>
</header>
<!-- Main Content -->
<main class="flex-grow w-full max-w-md mx-auto px-4 pt-8 safe-bottom">
<!-- Page Heading & Folder Actions -->
<header class="mb-6 text-right">
<div class="flex flex-row-reverse justify-between items-center mb-4">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">המיקומים שלי</h2>
<button class="flex items-center gap-1 text-primary hover:underline">
<span class="font-label-md text-label-md">ניהול תיקיות</span>
<span class="material-symbols-outlined text-[18px]">folder_managed</span>
</button>
</div>
<!-- Folder Filters -->
<div class="flex flex-row-reverse gap-2 overflow-x-auto pb-2 -mx-1 px-1">
<button class="whitespace-nowrap px-4 py-1.5 rounded-full bg-primary text-white font-label-md text-label-md shadow-sm">הכל</button>
<button class="whitespace-nowrap px-4 py-1.5 rounded-full bg-surface-container-high text-on-surface-variant font-label-md text-label-md hover:bg-surface-variant transition-colors">אירופה 2026</button>
<button class="whitespace-nowrap px-4 py-1.5 rounded-full bg-surface-container-high text-on-surface-variant font-label-md text-label-md hover:bg-surface-variant transition-colors">טיול בפולין 2027</button>
</div>
</header>
<!-- Location Cards Section -->
<section class="space-y-6">
<!-- Trip Card 1 -->
<article class="bg-surface stone-border rounded-xl overflow-hidden shadow-sm">
<div class="relative h-28 w-full">
<div class="bg-cover bg-center w-full h-full opacity-90" style="background-image: url('https://www.gstatic.com/labs-code/stitch/stitch-placeholder-300x300.svg')"></div>
<div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent"></div>
</div>
<div class="p-4 text-right">
<div class="flex flex-row-reverse justify-between items-start mb-2">
<h3 class="font-headline-md text-headline-md text-on-surface">מזוביה, פולין</h3>
<button class="p-1 text-on-surface-variant">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
<div class="flex flex-row-reverse items-center gap-2 mb-1">
<span class="material-symbols-outlined text-outline text-[18px]">calendar_today</span>
<span class="font-body-md text-body-md text-on-surface-variant">8 ביולי 2026 – 12 ביולי 2026</span>
</div>
<div class="flex flex-row-reverse items-center gap-2 mb-4">
<span class="material-symbols-outlined text-outline text-[18px]">groups</span>
<span class="font-body-md text-body-md text-on-surface-variant">11 גברים</span>
</div>
<!-- Minyan Discovery Hook -->
<div class="bg-surface-container-low p-3 rounded-lg flex flex-row-reverse items-center justify-between mb-4 border border-outline-variant/10">
<div class="flex flex-row-reverse items-center gap-2">
<span class="material-symbols-outlined text-primary text-[20px]">mosque</span>
<span class="font-label-md text-label-md text-on-surface">1 מניינים ליד המיקום</span>
</div>
<button class="text-primary font-label-md text-label-md hover:underline decoration-primary/30">פרטים</button>
</div>
<!-- Actions -->
<div class="flex flex-row-reverse gap-2">
<button class="flex-1 py-2 bg-primary text-white rounded-lg font-label-md text-label-md active:scale-[0.98] transition-transform">עריכה</button>
<button class="flex-1 py-2 stone-border text-on-surface rounded-lg font-label-md text-label-md active:scale-[0.98] transition-transform">ביטול מיקום</button>
<button class="px-3 py-2 stone-border rounded-lg text-on-surface-variant active:scale-[0.98] transition-transform" title="העברה לתיקייה">
<span class="material-symbols-outlined block">drive_file_move</span>
</button>
</div>
</div>
</article>
<!-- Trip Card 2 -->
<article class="bg-surface stone-border rounded-xl overflow-hidden shadow-sm">
<div class="relative h-28 w-full">

</div>
<div class="p-4 text-right">

<button class="p-1 text-on-surface-variant">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
<div class="flex flex-row-reverse items-center gap-2 mb-1">
<span class="material-symbols-outlined text-outline text-[18px]">calendar_today</span>

</div>
<div class="flex flex-row-reverse items-center gap-2 mb-4">
<span class="material-symbols-outlined text-outline text-[18px]">groups</span>

<button class="w-full bg-surface-container-low p-3 rounded-lg flex flex-row-reverse items-center justify-center gap-2 mb-4 border border-dashed border-outline-variant/30 text-on-surface-variant hover:bg-surface-variant/20 transition-colors">
<span class="material-symbols-outlined text-[20px]">search</span>
<span class="font-label-md text-label-md">חיפוש מניינים ליד המיקום</span>
</button>
<!-- Actions -->
<div class="flex flex-row-reverse gap-2">
<button class="flex-1 py-2 bg-primary text-white rounded-lg font-label-md text-label-md active:scale-[0.98] transition-transform">עריכה</button>
<button class="flex-1 py-2 stone-border text-on-surface rounded-lg font-label-md text-label-md active:scale-[0.98] transition-transform">ביטול מיקום</button>
<button class="px-3 py-2 stone-border rounded-lg text-on-surface-variant active:scale-[0.98] transition-transform" title="העברה לתיקייה">
<span class="material-symbols-outlined block">drive_file_move</span>
</button>
</div>
</div>

<button class="fixed bottom-28 left-6 z-50 w-14 h-14 bg-primary text-white rounded-full shadow-xl flex items-center justify-center active:scale-90 transition-transform">
<span class="material-symbols-outlined text-[32px]">add_location_alt</span>
</button>

<nav class="fixed bottom-0 left-0 w-full z-50 flex flex-row-reverse justify-around items-center px-4 py-3 bg-surface border-t border-outline-variant/10 shadow-lg md:hidden rounded-t-xl">

<a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-4 py-1 transition-transform active:scale-95" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">travel_explore</span>
<span class="font-label-md text-label-md mt-1">המיקומים שלי</span>
</a>
<!-- Discover (Center / Primary) -->
<a class="flex flex-col items-center justify-center text-on-surface-variant/70 hover:bg-surface-container-low transition-colors px-4 py-1" href="#">
<span class="material-symbols-outlined">explore</span>

<span class="material-symbols-outlined">person</span>

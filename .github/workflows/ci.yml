name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Test (unit + worker)
        run: pnpm test
      # Playwright + axe e2e (WCAG 2.1 AA gate) are added with the UI stories
      # (US1/US2/US3) and will run here once present.

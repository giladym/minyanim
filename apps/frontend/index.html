<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>מניין</title>
    <!-- Heritage Voyage fonts — Hanken Grotesk (Latin display) + Assistant (Hebrew + body).
         PREVIEW via Google Fonts; MUST be self-hosted before shipping (GDPR — see
         public/fonts/README.md), same as the existing Assistant plan. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700;800&family=Hanken+Grotesk:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- No-flash theme: set before paint from saved pref, else OS. Full ThemeProvider in T024. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("minyanim_theme");
          var dark = t === "dark" || (!t || t === "system") &&
            window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (dark) document.documentElement.setAttribute("data-theme", "dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

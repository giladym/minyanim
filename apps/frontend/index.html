<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JStay</title>
    <!-- Fonts (Assistant + Hanken Grotesk) are self-hosted via @font-face in theme/tokens.css
         (woff2 in public/fonts/) — no Google Fonts hotlinking (GDPR). -->
    <!-- No-flash theme: set before paint from saved pref, else OS. Full ThemeProvider in T024. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("minyanim_theme");
          var dark = t === "dark" || (!t || t === "system") &&
            window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (dark) document.documentElement.setAttribute("data-theme", "dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
